version: '3.8'

services:
  skill-router:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skill-router
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=8080
      - LOG_LEVEL=info
    volumes:
      - ./agent:/app/agent:ro
      - skill-router-cache:/app/.cache
      - skill-router-output:/app/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  skill-router-cache:
  skill-router-output:
