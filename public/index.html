<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>skill-router</title>
    <link rel="stylesheet" href="/vendor/highlight.js/styles/github-dark.css" />
    <style>
      :root {
        color-scheme: dark;
        --mui-font: Roboto, system-ui, -apple-system, Segoe UI, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        --mui-bg: #121212;
        --mui-paper: #1e1e1e;
        --mui-paper-2: #242424;
        --mui-divider: rgba(255, 255, 255, 0.12);
        --mui-outline: rgba(255, 255, 255, 0.23);
        --mui-text: rgba(255, 255, 255, 0.87);
        --mui-text-2: rgba(255, 255, 255, 0.7);
        --mui-text-3: rgba(255, 255, 255, 0.5);
        --mui-primary: #1976d2;
        --mui-primary-2: #1565c0;
        --mui-primary-contrast: #ffffff;
        --mui-action-hover: rgba(255, 255, 255, 0.08);
        --mui-action-focus: rgba(255, 255, 255, 0.12);
        --mui-field-bg: rgba(255, 255, 255, 0.06);
        --mui-field-bg-hover: rgba(255, 255, 255, 0.08);
        --mui-error: #d32f2f;
        --mui-success: #2e7d32;
        --mui-radius: 8px;
        --mui-radius-2: 12px;
        --mui-shadow-1: 0px 2px 1px -1px rgba(0,0,0,0.2), 0px 1px 1px 0px rgba(0,0,0,0.14), 0px 1px 3px 0px rgba(0,0,0,0.12);
        --mui-shadow-2: 0px 3px 1px -2px rgba(0,0,0,0.2), 0px 2px 2px 0px rgba(0,0,0,0.14), 0px 1px 5px 0px rgba(0,0,0,0.12);
        --mui-shadow-3: 0px 3px 3px -2px rgba(0,0,0,0.2), 0px 3px 4px 0px rgba(0,0,0,0.14), 0px 1px 8px 0px rgba(0,0,0,0.12);
      }

      * { box-sizing: border-box; }

      body {
        font-family: var(--mui-font);
        font-size: 14px;
        line-height: 1.5;
        margin: 0;
        background: var(--mui-bg);
        color: var(--mui-text);
      }
      .wrap { max-width: 1040px; margin: 0 auto; padding: 28px 18px 44px; }
      h1 { font-size: 20px; font-weight: 600; margin: 0 0 18px; letter-spacing: 0.1px; }
      .grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
      @media (min-width: 860px) { .grid { grid-template-columns: 1fr 1fr; } }
      .card { background: var(--mui-paper); border: 1px solid var(--mui-divider); border-radius: var(--mui-radius); padding: 16px; box-shadow: var(--mui-shadow-1); }
      .card:hover { box-shadow: var(--mui-shadow-2); }
      .card h2 { font-size: 14px; font-weight: 600; margin: 0 0 12px; color: var(--mui-text); letter-spacing: 0.12px; }
      label { display: block; font-size: 12px; color: var(--mui-text-2); margin-bottom: 6px; }
      input[type="text"], input[type="password"], input[type="url"], input[type="email"], input[type="number"], input[type="search"], input[type="file"], textarea, select {
        width: 100%;
        background: var(--mui-field-bg);
        color: var(--mui-text);
        border: 1px solid var(--mui-outline);
        border-radius: 6px;
        padding: 10px 14px;
        outline: none;
        transition: border-color 120ms ease, box-shadow 120ms ease, background 120ms ease;
      }
      input[type="checkbox"], input[type="radio"] {
        width: 16px;
        height: 16px;
        accent-color: var(--mui-primary);
      }
      select { background: var(--mui-field-bg); }
      select:hover { background: var(--mui-field-bg-hover); }
      select:focus { background: var(--mui-field-bg-hover); }
      select option { background: #141414; color: var(--mui-text); }
      :is(input[type="text"], input[type="password"], input[type="url"], input[type="email"], input[type="number"], input[type="search"], textarea)::placeholder { color: rgba(255, 255, 255, 0.45); }
      :is(input[type="text"], input[type="password"], input[type="url"], input[type="email"], input[type="number"], input[type="search"], input[type="file"], textarea, select):hover { border-color: rgba(255, 255, 255, 0.38); }
      :is(input[type="text"], input[type="password"], input[type="url"], input[type="email"], input[type="number"], input[type="search"], input[type="file"], textarea, select):focus { border-color: var(--mui-primary); box-shadow: 0 0 0 2px rgba(25, 118, 210, 0.28); }
      :is(input[type="text"], input[type="password"], input[type="url"], input[type="email"], input[type="number"], input[type="search"], input[type="file"], textarea, select):focus-visible { outline: 0; }
      textarea { min-height: 132px; resize: vertical; }
      input[type="file"] { padding: 8px 10px; }
      .row { display: grid; grid-template-columns: 1fr; gap: 12px; }
      @media (min-width: 560px) { .row { grid-template-columns: 1fr 1fr; } }
      .btns { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
      button {
        background: var(--mui-primary);
        border: 0;
        color: var(--mui-primary-contrast);
        border-radius: 8px;
        padding: 8px 16px;
        cursor: pointer;
        font-weight: 500;
        letter-spacing: 0.35px;
        min-height: 36px;
        box-shadow: var(--mui-shadow-2);
        transition: background 120ms ease, box-shadow 120ms ease, transform 80ms ease, border-color 120ms ease;
      }
      button:hover { background: var(--mui-primary-2); box-shadow: var(--mui-shadow-3); }
      button:active { transform: translateY(0.5px); }
      button:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }
      button.secondary {
        background: transparent;
        color: var(--mui-text);
        border: 1px solid var(--mui-outline);
        box-shadow: none;
      }
      button.secondary:hover { background: var(--mui-action-hover); border-color: rgba(255, 255, 255, 0.35); box-shadow: none; }
      button:focus-visible { outline: 0; box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.28); }
      .hint { font-size: 12px; color: var(--mui-text-3); line-height: 1.4; }
      pre { background: rgba(255, 255, 255, 0.04); border: 1px solid var(--mui-divider); border-radius: var(--mui-radius); padding: 12px; overflow: auto; margin: 12px 0 0; }
      .ok { color: #81c784; }
      .err { color: #e57373; }
      .vHidden { display: none !important; }
      .hdrTable { width: 100%; border-collapse: separate; border-spacing: 0; border: 1px solid var(--mui-divider); border-radius: var(--mui-radius); overflow: hidden; }
      .hdrTable th, .hdrTable td { padding: 8px; border-bottom: 1px solid var(--mui-divider); vertical-align: top; }
      .hdrTable th { text-align: left; font-size: 12px; color: var(--mui-text-2); font-weight: 600; background: rgba(255, 255, 255, 0.03); }
      .hdrTable tr:last-child td { border-bottom: 0; }
      .hdrTable input { padding: 9px 10px; border-radius: 6px; }
      .hdrRmBtn { width: 34px; height: 34px; padding: 0; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; }
      .hdrRmBtn.secondary { border-color: rgba(255, 255, 255, 0.18); }
      .skillsTable th, .skillsTable td { padding: 6px 8px; font-size: 11px; line-height: 1.25; }
      .skillsTable th { font-size: 11px; }
      .pill { display: inline-flex; align-items: center; gap: 6px; padding: 2px 8px; border-radius: 999px; border: 1px solid rgba(255, 255, 255, 0.16); font-size: 11px; line-height: 1.6; }
      .muted { color: rgba(255, 255, 255, 0.45); }
      .warn { color: #ffb74d; }

      .app { min-height: 100vh; display: flex; flex-direction: column; }
      .appbar {
        position: sticky;
        top: 0;
        z-index: 5;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        background: rgba(18, 18, 18, 0.72);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--mui-divider);
      }
      .title { font-size: 16px; font-weight: 650; letter-spacing: 0.1px; }
      .spacer { flex: 1; }
      .iconBtn {
        width: 40px;
        height: 40px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: 1px solid var(--mui-outline);
        color: var(--mui-text);
        cursor: pointer;
        box-shadow: none;
      }
      .iconBtn:hover { background: var(--mui-action-hover); border-color: rgba(255, 255, 255, 0.28); }
      .iconBtn:active { transform: translateY(0.5px); }
      .iconBtn:focus-visible { outline: 0; box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.28); }

      .main { flex: 1; }
      .page { max-width: 1040px; margin: 0 auto; padding: 16px 18px 28px; }

      .chatShell { display: flex; flex-direction: column; gap: 12px; min-height: calc(100vh - 72px); }
      .chatMessages {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 14px;
        background: var(--mui-paper);
        border: 1px solid var(--mui-divider);
        border-radius: var(--mui-radius-2);
        overflow: auto;
      }
      .chatMessages:empty::before {
        content: "开始一段对话吧：输入问题，或上传文档作为参考。";
        color: rgba(255, 255, 255, 0.45);
        font-size: 13px;
        line-height: 1.6;
        padding: 10px 6px;
      }
      .chatMessages::-webkit-scrollbar { width: 10px; height: 10px; }
      .chatMessages::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.16); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
      .chatMessages::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.24); border: 2px solid transparent; background-clip: padding-box; }
      .msg { display: flex; }
      .msg.user { justify-content: flex-end; }
      .msg.assistant { justify-content: flex-start; }
      .msgCol { display: flex; flex-direction: column; gap: 6px; align-items: flex-start; }
      .msg.user .msgCol { align-items: flex-end; }
      .bubble {
        max-width: min(720px, 92%);
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid var(--mui-divider);
        background: rgba(255, 255, 255, 0.03);
        white-space: normal;
        word-break: break-word;
        line-height: 1.55;
      }
      .bubble :first-child { margin-top: 0; }
      .bubble :last-child { margin-bottom: 0; }
      .bubble p { margin: 0 0 10px; }
      .bubble ul, .bubble ol { margin: 8px 0 8px 20px; padding: 0; }
      .bubble li { margin: 4px 0; }
      .bubble a { color: #90caf9; text-decoration: underline; }
      .bubble blockquote {
        margin: 10px 0;
        padding: 8px 12px;
        border-left: 3px solid rgba(144, 202, 249, 0.45);
        background: rgba(255, 255, 255, 0.03);
        border-radius: 10px;
      }
      .bubble code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 12.5px;
        background: rgba(0, 0, 0, 0.22);
        border: 1px solid rgba(255, 255, 255, 0.10);
        padding: 0 6px;
        border-radius: 8px;
      }
      .bubble pre {
        margin: 10px 0;
        padding: 12px;
        background: rgba(0, 0, 0, 0.30);
        border: 1px solid var(--mui-divider);
        border-radius: 12px;
        overflow: auto;
      }
      .bubble pre code {
        display: block;
        background: transparent;
        border: 0;
        padding: 0;
        border-radius: 0;
        font-size: 12.5px;
        line-height: 1.6;
      }
      .bubble hr { border: 0; border-top: 1px solid var(--mui-divider); margin: 12px 0; }
      .bubble table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
      .bubble th, .bubble td { border: 1px solid var(--mui-divider); padding: 6px 8px; vertical-align: top; }
      .bubble th { background: rgba(255, 255, 255, 0.04); font-weight: 600; }
      .mdPreview {
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--mui-divider);
        background: rgba(255, 255, 255, 0.02);
      }
      .msg.assistant .bubble {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.03));
      }
      .msg.user .bubble {
        background: linear-gradient(180deg, rgba(25, 118, 210, 0.22), rgba(25, 118, 210, 0.14));
        border-color: rgba(25, 118, 210, 0.38);
      }
      .metaLine { font-size: 12px; color: rgba(255, 255, 255, 0.50); }
      .msg.user .metaLine { text-align: right; }

      .composer { padding: 14px; border: 1px solid var(--mui-divider); border-radius: var(--mui-radius-2); background: rgba(30, 30, 30, 0.92); backdrop-filter: blur(8px); box-shadow: var(--mui-shadow-1); }
      .composer textarea { min-height: 86px; }
      .attachRow { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 12px; }
      @media (min-width: 700px) { .attachRow { grid-template-columns: 1fr 1fr; } }

      .backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.56);
        z-index: 10;
        opacity: 1;
        transition: opacity 120ms ease;
      }
      .backdrop.hidden { opacity: 0; pointer-events: none; }
      .drawer {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: min(420px, 92vw);
        background: var(--mui-paper);
        border-right: 1px solid var(--mui-divider);
        z-index: 11;
        transform: translateX(0);
        transition: transform 160ms ease;
        display: flex;
        flex-direction: column;
      }
      .drawer.hidden { transform: translateX(-104%); }
      .drawerHeader { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--mui-divider); }
      .drawerTitle { font-size: 14px; font-weight: 600; }
      .drawerBody { padding: 14px; overflow: auto; display: flex; flex-direction: column; gap: 14px; }
      .section { background: var(--mui-paper-2); border: 1px solid var(--mui-divider); border-radius: var(--mui-radius); padding: 14px; }
      .sectionTitle { font-size: 13px; font-weight: 600; margin: 0 0 10px; color: var(--mui-text); }
      .memTree { font-size: 12px; margin-top: 10px; border: 1px solid var(--mui-divider); border-radius: 8px; overflow: hidden; }
      .memNode { padding: 6px 8px; border-bottom: 1px solid var(--mui-divider); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
      .memNode:last-child { border-bottom: 0; }
      .memNode:hover { background: rgba(255, 255, 255, 0.03); }
      .memPath { flex: 1; word-break: break-all; font-family: monospace; }
      .memMeta { color: var(--mui-text-3); font-size: 11px; }
      .memActions { display: flex; gap: 4px; }
      .memBtn { padding: 2px 6px; font-size: 10px; height: 20px; min-height: 0; }
      .trajectory { margin-top: 6px; padding: 8px; background: rgba(0, 0, 0, 0.2); border-radius: 8px; font-size: 11px; font-family: monospace; color: var(--mui-text-2); display: none; }
      .trajectory.show { display: block; }
      .trajBtn { font-size: 11px; padding: 2px 8px; height: 24px; margin-left: 8px; background: rgba(255, 255, 255, 0.08); border: 0; color: var(--mui-text-2); border-radius: 4px; cursor: pointer; }
      .trajBtn:hover { background: rgba(255, 255, 255, 0.12); }
      .progressBox { margin-top: 6px; padding: 8px; background: rgba(0, 0, 0, 0.2); border-radius: 8px; font-size: 11px; font-family: monospace; color: var(--mui-text-2); display: none; }
      .progressBtn { font-size: 11px; padding: 2px 8px; height: 24px; margin-left: 8px; background: rgba(255, 255, 255, 0.08); border: 0; color: var(--mui-text-2); border-radius: 4px; cursor: pointer; }
      .progressBtn:hover { background: rgba(255, 255, 255, 0.12); }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="appbar">
        <button id="menuBtn" class="iconBtn" aria-label="menu">≡</button>
        <div class="title">skill-router</div>
        <div class="spacer"></div>
        <button id="newChatBtn" class="secondary">新对话</button>
      </header>

      <main class="main">
        <div class="page">
          <div class="chatShell">
            <div id="chatMessages" class="chatMessages" aria-label="messages"></div>
            <div class="composer">
              <label>输入</label>
              <textarea id="chatInput" placeholder="描述你的任务…"></textarea>
              <div id="chatPreview" class="mdPreview vHidden" aria-label="preview" aria-hidden="true"></div>
              <div class="attachRow">
                <div>
                  <label>文档（可选，可多选）</label>
                  <input id="chatDocFile" type="file" multiple />
                </div>
              </div>
              <div class="btns">
                <button id="chatSend">发送</button>
                <button id="chatPreviewBtn" class="secondary" aria-pressed="false" aria-controls="chatPreview">预览</button>
              </div>
              <div id="chatHint" class="hint" style="margin-top: 8px;"></div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div id="drawerBackdrop" class="backdrop hidden"></div>
    <aside id="drawer" class="drawer hidden" aria-label="menu">
      <div class="drawerHeader">
        <div class="drawerTitle">菜单</div>
        <div class="spacer"></div>
        <button id="drawerClose" class="iconBtn" aria-label="close">×</button>
      </div>
      <div class="drawerBody">
        <div class="section">
          <div class="sectionTitle">本地配置（浏览器保存）</div>
          <div class="row">
            <div>
              <label>OPENAI_API_KEY</label>
              <input id="apiKey" type="password" autocomplete="off" placeholder="sk-..." />
            </div>
            <div>
              <label>OPENAI_MODEL</label>
              <input id="model" type="text" autocomplete="off" placeholder="gpt-4.1-mini" />
            </div>
          </div>
          <div style="margin-top: 10px;">
            <label>OPENAI_BASE_URL</label>
            <input id="baseUrl" type="text" autocomplete="off" placeholder="https://api.openai.com/v1" />
          </div>
          <div style="margin-top: 10px;">
            <label>CUSTOM_HEADERS (optional)</label>
            <table class="hdrTable" aria-label="custom headers">
              <thead>
                <tr>
                  <th style="width: 44%;">Header</th>
                  <th style="width: 44%;">Value</th>
                  <th style="width: 12%;"></th>
                </tr>
              </thead>
              <tbody id="customHeadersBody"></tbody>
            </table>
            <div class="btns" style="margin-top: 10px;">
              <button id="addCustomHeader" class="secondary" type="button">添加 Header</button>
            </div>
          </div>
          <div style="margin-top: 10px;">
            <label>OPENAI_SYSTEM_CONTENT (optional)</label>
            <textarea id="systemContent" placeholder="You are a helpful assistant..." style="min-height: 80px;"></textarea>
          </div>
          <div class="btns">
            <button id="saveCfg">保存到浏览器本地</button>
            <button id="clearCfg" class="secondary">清空本地配置</button>
            <button id="checkCfg" class="secondary">连通性自检</button>
          </div>
          <div id="cfgStatus" class="hint" style="margin-top: 8px;"></div>
        </div>

        <div class="section">
          <div class="sectionTitle">Embeddings (Kreuzberg) 下载</div>
          <div class="row">
            <div>
              <label>EMBEDDING_MODEL</label>
              <select id="embeddingModel" autocomplete="off">
                <option value="">(跟随服务端默认)</option>
                <option value="fast">fast (Kreuzberg preset)</option>
                <option value="balanced">balanced (Kreuzberg preset)</option>
                <option value="quality">quality (Kreuzberg preset)</option>
                <option value="multilingual">multilingual (Kreuzberg preset)</option>
                <option value="compact">compact (Kreuzberg preset)</option>
                <option value="large">large (Kreuzberg preset)</option>
                <option value="accurate">accurate (Kreuzberg preset)</option>
                <option value="text-embedding-3-small">text-embedding-3-small (OpenAI compatible)</option>
                <option value="text-embedding-3-large">text-embedding-3-large (OpenAI compatible)</option>
              </select>
            </div>
            <div>
              <label>HF_ENDPOINT</label>
              <select id="hfEndpoint" autocomplete="off">
                <option value="">(跟随服务端默认)</option>
                <option value="https://huggingface.co">huggingface.co</option>
                <option value="https://hf-mirror.com">hf-mirror.com</option>
              </select>
            </div>
          </div>
          <div class="btns">
            <button id="refreshEmbeddings" class="secondary">刷新状态</button>
          </div>
          <div id="embeddingsHint" class="hint" style="margin-top: 8px;"></div>
          <div id="embeddingsList" class="memTree" style="margin-top: 10px;"></div>
        </div>

        <div class="section">
          <div class="sectionTitle">上下文与记忆 (Context & Memory)</div>
          <div class="btns">
            <button id="refreshMemories" class="secondary">刷新列表</button>
          </div>
          <div style="margin-top: 8px;">
            <label style="display: inline-flex; gap: 8px; align-items: center;">
              <input id="memoryEnabled" type="checkbox" checked />
              <span>启用上下文/记忆检索（可能触发 embedding）</span>
            </label>
          </div>
          <div id="memoryTree" class="memTree"></div>
        </div>

        <div class="section">
          <div class="sectionTitle">Skills</div>
          <div class="btns">
            <button id="reloadSkills" class="secondary">刷新列表</button>
          </div>
          <table class="hdrTable skillsTable" aria-label="skills">
            <thead>
              <tr>
                <th style="width: 26%;">Name</th>
                <th style="width: 52%;">Description</th>
                <th style="width: 22%;">Group</th>
              </tr>
            </thead>
            <tbody id="skillsBody"></tbody>
          </table>
        </div>

        <div class="section">
          <div class="sectionTitle">路由选择（/choose）</div>
          <label>Query</label>
          <textarea id="chooseQuery" placeholder="帮我设计一个 REST API 的分页规范"></textarea>
          <div class="btns">
            <button id="btnChoose">Choose</button>
          </div>
          <pre id="chooseOut"></pre>
        </div>

        <div class="section">
          <div class="sectionTitle">文档提取（/documents/extract）</div>
          <div class="row">
            <div>
              <label>Files</label>
              <input id="docFile" type="file" multiple />
            </div>
          </div>
          <div class="btns">
            <button id="btnExtract">Extract</button>
          </div>
          <pre id="docOut"></pre>
        </div>
      </div>
    </aside>
